name: Crawl and Deploy

on:
  schedule:
    # 每天 UTC 时间 8:00 运行（北京时间 16:00）
    - cron: '0 8 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  crawl-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install crawler dependencies
        run: |
          cd crawler
          npm ci

      - name: Run crawlers
        run: npm run crawl
        env:
          CRAWLER_ENGINE: playwright

      - name: Check for data changes
        id: git-diff
        run: |
          git diff --exit-code src/content/ > /dev/null
          if [ $? -eq 1 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changed, will build and deploy"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes, skipping build and deploy"
          fi

      - name: Build Astro site
        if: steps.git-diff.outputs.changed == 'true'
        run: npm run build

      - name: Commit data changes
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/visa/
          git commit -m "chore: 自动更新签证政策数据 $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to GitHub Pages
        if: steps.git-diff.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
